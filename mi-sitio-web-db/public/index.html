<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>
Mi sitio con Base de Datos
</title>

<style>

body{
    font-family:Arial;
    background-image:url(
'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'
    );

    background-size:cover;
    color:white;
    text-align:center;
}

.container{

background:rgba(
0,0,0,.6
);

margin:50px auto;
padding:20px;
width:80%;
border-radius:10px;

}

button{

padding:10px;
margin:5px;
cursor:pointer;

}

input{

padding:10px;
margin:5px;

}

</style>

</head>


<body>

<div class="container">

<h1>

Aplicación Web con Base de Datos

</h1>


<button onclick="obtenerDatos()">

Consultar Usuarios

</button>


<br><br>


<input
id="nombre"
placeholder="Nombre">


<input
id="correo"
placeholder="Correo">


<button
onclick="agregarUsuario()">

Agregar Usuario

</button>


<pre id="resultado"></pre>


</div>



<script>


/*
=====================
CONSULTAR TODOS
=====================
*/

async function obtenerDatos(){

const resultado =
document.getElementById(
'resultado'
);

try{

resultado.innerText =
"Cargando...";


const respuesta =
await fetch(
'/usuarios'
);


const datos =
await respuesta.json();


resultado.innerText =

JSON.stringify(
datos,
null,
2
);

}catch(error){

resultado.innerText =

"Error: "

+ error.message;

}

}



/*
=====================
AGREGAR
=====================
*/

async function agregarUsuario(){


const nombre =

document.getElementById(
'nombre'
).value;



const correo =

document.getElementById(
'correo'
).value;



await fetch(

'/usuarios',

{

method:'POST',

headers:{

'Content-Type':

'application/json'

},

body:

JSON.stringify({

nombre,
correo

})

}

);


document.getElementById(
'nombre'
).value='';


document.getElementById(
'correo'
).value='';



obtenerDatos();

}



</script>


</body>

</html>
