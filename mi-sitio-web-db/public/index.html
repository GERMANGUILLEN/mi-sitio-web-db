<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>
CRUD Usuarios
</title>

<style>

body{

font-family:Arial;
background-image:url(
'https://images.unsplash.com/photo-1507525428034-b723cf961d3e'
);

background-size:cover;
color:white;
text-align:center;

}

.container{

background:rgba(
0,0,0,.6
);

margin:50px auto;
padding:20px;
width:80%;
border-radius:10px;

}

button,input{

padding:10px;
margin:5px;

}

</style>

</head>

<body>

<div class="container">

<h1>
CRUD Usuarios
</h1>


<button onclick="obtenerDatos()">

Consultar Usuarios

</button>

<br>


<input
id="nombre"
placeholder="Nombre">


<input
id="correo"
placeholder="Correo">


<button
onclick="agregarUsuario()">

Agregar

</button>


<br>


<input
id="idEliminar"
placeholder="ID eliminar">


<button
onclick="eliminarUsuario()">

Eliminar

</button>



<pre id="resultado"></pre>

</div>



<script>


async function obtenerDatos(){

const respuesta =
await fetch('/usuarios');

const datos =
await respuesta.json();

document.getElementById(
'resultado'
).innerText=

JSON.stringify(
datos,
null,
2
);

}



/* AGREGAR */

async function agregarUsuario(){

const nombre =
document.getElementById(
'nombre'
).value;


const correo =
document.getElementById(
'correo'
).value;


await fetch(

'/usuarios',

{

method:'POST',

headers:{

'Content-Type':
'application/json'

},

body:

JSON.stringify({

nombre,
correo

})

}

);


obtenerDatos();

}



/* ELIMINAR */

async function eliminarUsuario(){

const id=

document.getElementById(
'idEliminar'
).value;


await fetch(

'/usuarios/'+id,

{

method:'DELETE'

}

);


obtenerDatos();

}


</script>

</body>
</html>
